        // MUSEUM DESCRIPTION GENERATOR (Simulating Curatorial Text)

            const index = parseInt(id.split('-')[1]);
            const descs = [
                "Defined by a fluid architectural structure, this piece utilizes solid gold to capture light across its hammered planes.",
                "A study in texture, featuring granulated detailing reminiscent of Etruscan revival techniques, hand-finished to a matte lustre.",
                "Constructed with articulated segments that allow for movement, creating a seamless integration between the object and the body.",
                "An archival form reinterpreted through heavy gauge gold, prioritizing silhouette and the inherent warmth of the material.",
                "Marked by intricate filigree work, this piece demonstrates the maison's commitment to preserving complex hand-fabrication methods."
            ];
            return descs[index % descs.length];
        }

                                "Each piece is handcrafted in gold, informed by historic form and executed with restraint."
                            </p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-8 gap-y-12">
                            ${gridHtml}
                        </div>
                        <div class="mt-24 text-center">
                            <a href="#home" class="text-[10px] tracking-widest uppercase text-neutral-500 hover:text-white transition-colors">Return to Maison</a>
                        </div>
                    </div>
                </div>
            `;
        }

        // HELPER: Category Tile
        function generateCategoryTile(title, img) {
            return `
                <a href="#${title.toLowerCase()}" class="group relative block aspect-[4/5] overflow-hidden bg-neutral-900">
                    <img src="${img}" alt="${title}" class="w-full h-full object-cover transition-transform duration-[1.5s] group-hover:scale-105 opacity-60 group-hover:opacity-100">
                    <div class="absolute inset-0 bg-neutral-950/30 group-hover:bg-transparent transition-colors duration-700"></div>
                    <div class="absolute bottom-8 left-8">
                        <span class="font-serif text-2xl text-white tracking-wide block mb-2">${title}</span>
                        <span class="text-[9px] uppercase tracking-widest text-neutral-400 border-b border-transparent group-hover:border-gold-300 group-hover:text-gold-300 transition-all pb-1">View Collection</span>
                    </div>
                </a>
            `;
        }

        // HELPER: Signature Piece
        function generateSignaturePiece(label, img, id, extraClasses = '') {
            // Extract category for modal linkage
            const cat = label.split(' / ')[1].toLowerCase().trim() + 's'; 
            // Handle singular/plural mismatch for linking
            let safeCat = cat;
            if (cat === 'bracelets') safeCat = 'bracelets';
            if (cat === 'necklaces') safeCat = 'necklaces';
            if (cat === 'earringss') safeCat = 'earrings'; 

            return `
                <div class="flex flex-col items-center group cursor-pointer ${extraClasses}" onclick="openModal('${safeCat}', '${id}', '${img}')">
                    <div class="w-full aspect-[4/5] bg-neutral-900 mb-8 overflow-hidden relative shadow-2xl">
                        <img src="${img}" alt="${label}" class="w-full h-full object-cover opacity-90 transition-all duration-1000 group-hover:opacity-100 group-hover:scale-105">
                    </div>
                    <span class="text-[10px] tracking-widest uppercase text-neutral-500 mb-2">${label}</span>
                    <span class="text-[9px] uppercase tracking-widest text-white border-b border-transparent group-hover:border-gold-400 transition-all pb-1">View Piece</span>
                </div>
            `;
        }

        // MODAL LOGIC
        function openModal(category, id, imgUrl) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            
            // Clean up Category Name
            const displayCat = category.charAt(0).toUpperCase() + category.slice(1);
            
            content.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 h-full">
                    <div class="bg-neutral-900 h-[50vh] lg:h-full relative overflow-hidden">
                        <img src="${imgUrl}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-12 lg:p-20 flex flex-col justify-center bg-neutral-950 relative">
                        <button onclick="closeModal()" class="absolute top-8 right-8 text-white hover:text-gold-300 transition-colors">
                            <iconify-icon icon="lucide:x" width="24"></iconify-icon>
                        </button>
                        
                        <span class="text-[9px] tracking-[0.2em] uppercase text-gold-500 mb-4 block">Nikos Ioannou Archive</span>
                        <h2 class="font-serif text-3xl text-white mb-8">Historic Gold ${displayCat}</h2>
                        
                        <div class="space-y-4 text-[10px] tracking-widest uppercase text-neutral-500 mb-12 border-t border-b border-neutral-900 py-8">
                            <div class="flex justify-between"><span>Category</span> <span class="text-neutral-300">${displayCat}</span></div>
                            <div class="flex justify-between"><span>Material</span> <span class="text-neutral-300">Gold</span></div>
                            <div class="flex justify-between"><span>ID</span> <span class="text-neutral-300">${id}</span></div>
                        </div>
                        
                        <p class="text-sm font-light text-neutral-400 leading-7 mb-12">
                            "A historic gold piece defined by sculptural form and measured ornamentation. Executed by hand, with emphasis on proportion, surface, and permanence."
                        </p>
                        
                        <a href="#contact" onclick="closeModal()" class="inline-block text-center border border-neutral-800 py-4 text-[10px] tracking-widest uppercase text-white hover:bg-white hover:text-black transition-all">
                            Enquire About This Piece
                        </a>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            // Slight delay for animation
            setTimeout(() => {
                modal.classList.add('modal-active');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('modal-active');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
            document.body.style.overflow = 'auto';
        }

        // INIT
        window.addEventListener('load', loadRoute);
        window.addEventListener('hashchange', loadRoute);

    </script>
